<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Instsoft</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      color: #1d2430;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      max-width: 640px;
      text-align: center;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(2.25rem, 7vw, 4.5rem);
      font-weight: 800;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      font-size: 1.125rem;
      line-height: 1.7;
      color: #4b5565;
    }
  </style>
</head>
<body>
  <main>
    <h1>Instsoft</h1>
    <p>간단한 첫 페이지가 GitHub에 올라왔습니다.</p>
  </main>
</body>
</html>
